{% extends 'base.html' %}

{% block title %}Marcar Asistencia{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h4>Marcar Asistencia</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="identificacion" class="form-label">Identificación</label>
                        <input type="text" name="identificacion" id="identificacion" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Marcar</button>
                    <a href="{% url 'attendance_list' %}" class="btn btn-secondary">Ver Lista</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
