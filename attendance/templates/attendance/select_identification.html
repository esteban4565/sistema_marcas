{% extends 'base.html' %}

{% block title %}Seleccionar {{ person_type_display }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h4>Seleccionar {{ person_type_display }}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="identificacion" class="form-label">
                            <i class="fas fa-id-card"></i> Identificación del {{ person_type_display|lower }}
                        </label>
                        <input type="text" name="identificacion" id="identificacion" class="form-control" required
                               placeholder="Ingrese la identificación">
                        <div class="form-text">
                            Ingrese la identificación del {{ person_type_display|lower }} para consultar sus marcas.
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'attendance_list' %}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Volver
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-search"></i> Buscar Marcas
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
