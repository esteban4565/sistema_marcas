{% extends 'base.html' %}

{% block title %}Eliminar Rol{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h4>Eliminar Rol</h4>
            </div>
            <div class="card-body">
                <p>¿Estás seguro de eliminar el rol "<strong>{{ object.name }}</strong>"?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                    <a href="{% url 'role_list' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
