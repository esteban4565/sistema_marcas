{% extends 'base.html' %}

{% block title %}{% if object %}Editar{% else %}Crear{% endif %} Rol{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h4>{% if object %}Editar{% else %}Crear{% endif %} Rol</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.name.id_for_label }}" class="form-label">Nombre</label>
                        {{ form.name }}
                        {% if form.name.errors %}
                            <div class="text-danger">{{ form.name.errors }}</div>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a href="{% url 'role_list' %}" class="btn btn-secondary">Volver</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
