{% extends 'base.html' %}

{% block title %}Lista de Roles{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4>Roles de Usuarios</h4>
            </div>
            <div class="card-body">
                <a href="{% url 'role_create' %}" class="btn btn-primary mb-3">Agregar Rol</a>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for role in roles %}
                        <tr>
                            <td>{{ role.name }}</td>
                            <td>
                                <a href="{% url 'role_update' role.pk %}" class="btn btn-warning btn-sm">Editar</a>
                                <a href="{% url 'role_delete' role.pk %}" class="btn btn-danger btn-sm">Eliminar</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
