{% extends 'base.html' %}

{% block title %}Eliminar Personal{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h4>Eliminar Personal</h4>
            </div>
            <div class="card-body">
                <p>¿Estás seguro de eliminar el registro de <strong>{{ object.nombre }} {{ object.apellido1 }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                    <a href="{% url 'personal_list' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
